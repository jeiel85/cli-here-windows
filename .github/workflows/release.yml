name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish src/CliHere.App/CliHere.App.csproj --configuration Release --runtime win-x64 --self-contained false -p:PublishSingleFile=true -p:DebugType=None -p:DebugSymbols=false -o dist/CliHere

      - name: Generate SHA256
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 dist/CliHere/CliHere.exe).Hash.ToLower()
          "$hash  CliHere.exe" | Out-File -FilePath dist/CliHere/CliHere.exe.sha256 -Encoding ascii

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/CliHere/* -DestinationPath dist/CliHere-win-x64.zip

      - name: Verify asset
        shell: pwsh
        run: |
          if (!(Test-Path dist/CliHere-win-x64.zip)) { throw "Missing release asset" }
          $item = Get-Item dist/CliHere-win-x64.zip
          if ($item.Length -le 0) { throw "Release asset is empty" }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CliHere-win-x64
          path: dist/CliHere-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/CliHere-win-x64.zip
            dist/CliHere/CliHere.exe
            dist/CliHere/CliHere.exe.sha256
          generate_release_notes: true
